name: Restrict Merge to Main

on:
  pull_request:
    branches: [main]

jobs:
  check_branch:
    runs-on: ubuntu-latest
    steps:
      - name: Check Branch
        if: github.base_ref == 'main' && github.head_ref !='develop'
        run: |
          echo "ERROR: You can only merge to 'main' from 'develop'."
          exit 1